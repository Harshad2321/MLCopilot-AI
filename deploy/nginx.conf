# MLCopilot AI — Nginx Reverse Proxy Configuration
# Place at: /etc/nginx/conf.d/mlcopilot.conf
#
# This proxies port 80 → FastAPI on port 8000
# Add SSL (HTTPS) by running: sudo certbot --nginx -d your-domain.com

server {
    listen 80;
    server_name _;   # accepts any domain or IP — change to your domain

    # ── API (FastAPI backend) ─────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── Root and all other paths → FastAPI ────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip            on;
    gzip_types      application/json text/plain;
    gzip_min_length 1000;
}
